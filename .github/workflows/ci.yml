name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Pinned so CI formatting matches what the code was formatted with.
      - run: python -m pip install black==24.8.0
      - run: black --check --diff src/ tests/
      - uses: crate-ci/typos@v1.48.0

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q --cov=pyomo_cp --cov-report=term-missing

  no-ortools:
    # The package must import and register even with OR-Tools absent.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pip uninstall -y ortools
      - run: >
          python -c "import pyomo_cp, pyomo.environ as pyo;
          assert pyo.SolverFactory('cpsat').available() is False;
          assert pyo.TransformationFactory('cp.discretize') is not None;
          print('imports and registers without ortools')"

  min-deps:
    # Exercise the declared floors: oldest supported Python and minimum Pyomo.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pip install "pyomo==6.7"
      - run: python -m pytest -q
